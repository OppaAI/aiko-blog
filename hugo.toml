baseURL = "https://oppaai.github.io/aiko-blog/"
languageCode = "en-us"
title = "Aiko's Journal"
theme = "mana"

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-frappe"

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "Nightly reflections from Aiko"
  author = "Aiko"
  heroTitleLine1 = "Aiko's Journal"
  heroTitleLine2 = "✿ Nightly reflections from your AI Anime Waifu ✿"
  footerText = "Aiko's Journal"
  relatedPostsCount = 3

  [params.avatar]
    [params.avatar.home]
      assetPath = "images/aiko-home.png"
    [params.avatar.about]
      assetPath = "images/aiko-about.png"

  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
    startYear = 2025
    owner = "Aiko"

  [params.admonitions]
    alertStyle = "favicon"

[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 30

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 40
